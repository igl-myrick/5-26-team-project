<!DOCTYPE HTML>
<html>
  <title>
    Colors! Team Project API Project 
  </title>
  <body>
    <div class="disclaimer transparent-background hidden" id="disclaimer">
      <div class="box">
        <button id="disclaimer-button-id">Click to Enter</button>
      </div>
    </div>
    <div class="grid-body" id="main-body">
      <div class="body1 project-title-card">
        <div class="centered">
          <h1 class="title transparent-background">Colors! Explore the Rainbow Spectrum</h1>
          <p class="credit-box">
            By: 
            <span><a href="https://github.com/igl-myrick" class="name">India Lyon-Myrick</a></span>,  
            <span><a href="https://github.com/MakeyeB" class="name">MakeyeB</a></span>, and 
            <span><a href="https://github.com/JButch-99" class="name">Josh Butcher</a></span>
          </p>
        </div>
      </div>
      <div class="body2" id="body2">
        <div class="row">
            <div class="col-md-2 section">
              <h1>
                Resources
              </h1>
            </div>
            <div class="col-md-4 section">
              <h1>Controls</h1>
              <div class="dropdown">
                <button id="options">Click Me for Options</button>
                <div id="mainMenu" class="menu hidden">
                  <button id="display-button" class="menu-button">Display Content</button>
                  <button id="cycle-up" class="menu-button">Cycle /\</button>
                  <button id="cycle-down" class="menu-button">Cycle \/</button>
                  <button id="reset-page" class="menu-button">Reset Page</button>
                  <button id="splatter" class="menu-button">Splatter the page!</button>
                </div>
              </div>
            </div>
            <div class="col-md-2 section">
              
            </div>
          </div>
      </div>
      <div class="body3" id="body3">
        <div class="box">
          <h1>Painter's Palette</h1>
          <div class="scroll">
            <div class="centered">
              <div id="color1">

              </div>
              <p id="hex1"></p>
            </div>
            <div class="centered">
              <div id="color2">
                
              </div>
              <p id="hex2"></p>
            </div>
            <div class="centered">
              <div id="color3">
                
              </div>
              <p id="hex3"></p>
            </div>
            <div class="centered">
              <div id="color4">
                
              </div>
              <p id="hex4"></p>
            </div>
            <div class="centered">
              <div id="color5">
                
              </div>
              <p id="hex5"></p>
            </div>
          </div>
          <div class="box">
            <span id="selected-item"></span>
          </div>
        </div>
      </div>
      <div class="body4" id="body4">
        <h1>Pick Your Colors</h1>
        <div class="centered">
          <p>Pick some colors, and the rest will be generated around your selection!</p>
          <p>Leave a color black to have it be replaced.</p>
        </div>
        <form id="color-select">
          <div class="centered">
            <label for="color-input-1">Color #1</label><br/>
            <input type="color" class="color-input" name="color-input-1" id="color-input-1">
          </div>
          <div class="centered">
            <label for="color-input-2">Color #2</label><br/>
            <input type="color" class="color-input" name="color-input-2" id="color-input-2">
          </div>
          <div class="centered">
            <label for="color-input-3">Color #3</label><br/>
            <input type="color" class="color-input" name="color-input-3" id="color-input-3">
          </div>
          <div class="centered">
            <label for="color-input-4">Color #4</label><br/>
            <input type="color" class="color-input" name="color-input-4" id="color-input-4">
          </div>
          <div class="centered">
            <label for="color-input-5">Color #5</label><br/>
            <input type="color" class="color-input" name="color-input-5" id="color-input-5">
          </div>
        </form>
      </div>
      <div class="body5" id="body5">
        <h1>Body 5</h1>
      </div>
      <div class="body6" id="body6">
        <h1>Body 6</h1>
      </div>
      <div class="body7" id="body7">
        <h1>Body 7</h1>
      </div>
    </div>
  </body>
</html>
